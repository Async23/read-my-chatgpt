name: Feature request
description: 建议符合只读、本机和安全边界的新能力
title: "[Feature] "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，没有发现相同建议。
          required: true
        - label: 该建议保持只读，不要求绕过服务条款、安全验证或账号限制。
          required: true
        - label: 该建议不会要求把 MCP 暴露到局域网或公网。
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 描述使用场景和当前阻碍，不要只描述实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
  - type: textarea
    id: security
    attributes:
      label: 隐私、安全与兼容性影响
      description: 说明是否涉及 token、配置文件、后台服务、上游 endpoint 或新增依赖。
    validations:
      required: true
