name: Bug report
description: 报告可复现的问题（不要提交任何 token、cookie 或私人会话）
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全问题请使用 **Security → Report a vulnerability**，
        不要在公开 Issue 中粘贴 access token、MCP Bearer token、cookie、
        私人会话、完整配置或未经检查的日志。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，没有发现相同问题。
          required: true
        - label: 我确认下面的内容已经脱敏，不含 token、cookie、私人会话或个人路径。
          required: true
        - label: 这不是安全漏洞；安全问题应使用私密漏洞报告。
          required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Linux
        - Other / legacy stdio mode
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: CPU 架构
      placeholder: arm64 / x64
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js 版本
      placeholder: node --version
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: read-my-chatgpt 版本
      placeholder: read-my-chatgpt --version
    validations:
      required: true
  - type: input
    id: clients
    attributes:
      label: AI 客户端及版本
      placeholder: 例如 Codex 0.x、Cursor 1.x
  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
      description: 从干净状态开始，列出能够稳定复现问题的最少步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: 已脱敏的 doctor 输出
      description: 可粘贴 `read-my-chatgpt doctor --json`；请再次确认不含敏感数据。
      render: shell
